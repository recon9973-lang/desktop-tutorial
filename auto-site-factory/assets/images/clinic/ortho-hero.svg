<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <defs>
    <radialGradient id="bg" cx="55%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#065f46"/>
    </radialGradient>
    <!-- 미세 도트 패턴 -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.5" fill="rgba(255,255,255,0.12)"/>
    </pattern>
    <!-- 부드러운 원형 블러 하이라이트 -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- 배경 -->
  <rect width="1100" height="720" fill="url(#bg)"/>
  <!-- 도트 패턴 오버레이 -->
  <rect width="1100" height="720" fill="url(#dots)"/>
  <!-- 글로우 원 -->
  <ellipse cx="605" cy="306" rx="440" ry="302.4" fill="url(#glow)"/>
  <!-- 배경 원형 장식 -->
  <circle cx="968" cy="129.6" r="158.4" fill="rgba(255,255,255,0.06)"/>
  <circle cx="110" cy="561.6" r="108" fill="rgba(255,255,255,0.06)"/>
  <!-- 아이콘/일러스트 -->
  <circle cx="550" cy="310" r="160" fill="rgba(255,255,255,0.1)"/>
    <!-- 인체 실루엣 -->
    <circle cx="550" cy="190" r="42" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <rect x="520" y="235" width="60" height="130" rx="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <line x1="520" y1="260" x2="460" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="8" stroke-linecap="round"/>
    <line x1="580" y1="260" x2="640" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="8" stroke-linecap="round"/>
    <line x1="530" y1="365" x2="510" y2="460" stroke="rgba(255,255,255,0.3)" stroke-width="8" stroke-linecap="round"/>
    <line x1="570" y1="365" x2="590" y2="460" stroke="rgba(255,255,255,0.3)" stroke-width="8" stroke-linecap="round"/>
  <!-- 하단 텍스트 배지 -->
  <rect x="450" y="640" width="200" height="52" rx="26" fill="rgba(0,0,0,0.22)"/>
  <text x="550" y="663" text-anchor="middle" font-family="'Pretendard','Inter',Arial,sans-serif" font-size="15.84" font-weight="700" fill="rgba(255,255,255,0.95)" letter-spacing="2">ORTHOPEDICS</text>
  <text x="550" y="682" text-anchor="middle" font-family="'Pretendard','Inter',Arial,sans-serif" font-size="20.16" font-weight="500" fill="rgba(255,255,255,0.75)">정형외과 전문</text>
</svg>