<svg xmlns="http://www.w3.org/2000/svg" width="700" height="520" viewBox="0 0 700 520">
  <defs>
    <radialGradient id="bg" cx="55%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
    <!-- 미세 도트 패턴 -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.5" fill="rgba(255,255,255,0.12)"/>
    </pattern>
    <!-- 부드러운 원형 블러 하이라이트 -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- 배경 -->
  <rect width="700" height="520" fill="url(#bg)"/>
  <!-- 도트 패턴 오버레이 -->
  <rect width="700" height="520" fill="url(#dots)"/>
  <!-- 글로우 원 -->
  <ellipse cx="385.00000000000006" cy="221" rx="280" ry="218.4" fill="url(#glow)"/>
  <!-- 배경 원형 장식 -->
  <circle cx="616" cy="93.6" r="114.4" fill="rgba(255,255,255,0.06)"/>
  <circle cx="70" cy="405.6" r="78" fill="rgba(255,255,255,0.06)"/>
  <!-- 아이콘/일러스트 -->
  <ellipse cx="350" cy="260" rx="130" ry="100" fill="rgba(255,255,255,0.18)"/>
  <!-- 하단 텍스트 배지 -->
  <rect x="250" y="440" width="200" height="52" rx="26" fill="rgba(0,0,0,0.22)"/>
  <text x="350" y="463" text-anchor="middle" font-family="'Pretendard','Inter',Arial,sans-serif" font-size="11.44" font-weight="700" fill="rgba(255,255,255,0.95)" letter-spacing="2">EXERCISE</text>
  <text x="350" y="482" text-anchor="middle" font-family="'Pretendard','Inter',Arial,sans-serif" font-size="14.56" font-weight="500" fill="rgba(255,255,255,0.75)">운동치료</text>
</svg>