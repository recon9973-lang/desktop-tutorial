<?xml version="1.0" encoding="UTF-8"?>
<svg width="1100" height="720" viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgfitnesshero" cx="35%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="55%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#7c2d12" />
    </radialGradient>
    <radialGradient id="glowfitnesshero" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
    <pattern id="dotsfitnesshero" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.5" fill="rgba(255,255,255,0.18)" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="url(#bgfitnesshero)" />

