  <g transform="translate(150, 0) scale(1)">
    
      <circle cx="400" cy="340" r="95" fill="rgba(255,255,255,0.3)" />
      <rect x="355" y="275" width="12" height="130" rx="6" fill="rgba(255,255,255,0.7)" />
