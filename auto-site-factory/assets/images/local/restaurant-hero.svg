      <rect x="393" y="275" width="12" height="130" rx="6" fill="rgba(255,255,255,0.7)" />
      <rect x="435" y="280" width="12" height="125" rx="6" fill="rgba(255,255,255,0.7)" />
      <ellipse cx="441" cy="290" rx="22" ry="16" fill="rgba(255,255,255,0.6)" />
