<?xml version="1.0" encoding="UTF-8"?>
<svg width="1100" height="720" viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgrestauranthero" cx="35%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#fef2f0" />
      <stop offset="55%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </radialGradient>
    <radialGradient id="glowrestauranthero" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
    <pattern id="dotsrestauranthero" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.5" fill="rgba(255,255,255,0.18)" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="url(#bgrestauranthero)" />

