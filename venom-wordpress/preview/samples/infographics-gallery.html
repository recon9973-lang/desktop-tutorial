<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VENOM 인포그래픽 갤러리 — 16종</title>
<style>
body{font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,system-ui,sans-serif;color:#0d253d;background:#f6f9fc;margin:0;padding:0 16px 60px}
.wrap{max-width:960px;margin:0 auto}
.hd{text-align:center;padding:44px 0 10px}
.hd .k{color:#533afd;font-weight:900;letter-spacing:1px;font-size:13px}
.hd h1{font-size:30px;font-weight:900;letter-spacing:-1px;margin:8px 0 6px}
.hd p{color:#64748d;font-size:15px;margin:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}
.blk{background:#fff;border:1px solid #e3e8ee;border-radius:16px;padding:6px 18px 18px}
.blk h3{font-size:15px;font-weight:800;margin:16px 4px 0;color:#0d253d}
.blk h3 span{display:inline-block;font-size:11px;font-weight:800;color:#533afd;background:#eef0ff;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}
.full{grid-column:span 2}
.note{background:#fff8e6;border:1px solid #f6e2a8;border-radius:14px;padding:14px 18px;font-size:13px;color:#7a5c12;margin:24px 0 0}
@media(max-width:720px){.grid{grid-template-columns:1fr}.full{grid-column:span 1}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="k">VENOM INFOGRAPHICS</div>
    <h1>인포그래픽 라이브러리 · 16종</h1>
    <p>참고 대시보드 기준으로 <b>레이더</b>·<b>라인/에어리어</b> 차트를 추가했습니다. (블로그·사이트 공용)</p>
  </div>

  <div class="grid">
    <div class="blk full"><h3>레이더 차트 <span>NEW</span> — 다축 역량 비교</h3>
      <div data-vinfo='[{"label":"전략","value":88},{"label":"콘텐츠","value":72},{"label":"검색노출","value":94},{"label":"전환","value":66},{"label":"CS응대","value":80}]' data-vshape="radar"></div></div>

    <div class="blk full"><h3>라인/에어리어 차트 <span>NEW</span> — 월별 문의 추이</h3>
      <div data-vinfo='[{"label":"1월","value":22},{"label":"2월","value":30},{"label":"3월","value":41},{"label":"4월","value":55},{"label":"5월","value":68},{"label":"6월","value":84}]' data-vshape="areaLine"></div></div>

    <div class="blk"><h3>세로 막대 — 주차별 성과</h3>
      <div data-vinfo='[{"label":"1주","value":60},{"label":"2주","value":45},{"label":"3주","value":75},{"label":"4주","value":90}]' data-vshape="verticalColumns"></div></div>

    <div class="blk"><h3>진행 링(도넛)</h3>
      <div data-vinfo='[{"label":"검색점유","value":60},{"label":"전환율","value":40},{"label":"재방문","value":70}]' data-vshape="progressRings"></div></div>

    <div class="blk"><h3>KPI 스탯 카드</h3>
      <div data-vinfo='[{"label":"신환 증가","value":320,"suffix":"%"},{"label":"재계약률","value":98},{"label":"협업 병원","value":120,"suffix":"곳"}]' data-vshape="statCards"></div></div>

    <div class="blk"><h3>랭킹(메달)</h3>
      <div data-vinfo='[{"label":"임플란트","value":92},{"label":"교정","value":78},{"label":"미백","value":64},{"label":"충치치료","value":51}]' data-vshape="rankingList"></div></div>

    <div class="blk"><h3>반원 게이지</h3>
      <div data-vinfo='[{"label":"목표 달성률","value":82},{"label":"콘텐츠 발행","value":60},{"label":"리뷰 응답","value":45}]' data-vshape="gaugeList"></div></div>

    <div class="blk"><h3>가로 막대</h3>
      <div data-vinfo='[{"label":"네이버","value":85},{"label":"구글","value":70},{"label":"AI 검색","value":55}]' data-vshape="horizontalBars"></div></div>

    <div class="blk"><h3>버블 스케일</h3>
      <div data-vinfo='[{"label":"인지","value":40},{"label":"관심","value":65},{"label":"내원","value":90}]' data-vshape="bubbleScale"></div></div>

    <div class="blk"><h3>히트 그리드</h3>
      <div data-vinfo='[{"label":"블로그","value":80},{"label":"플레이스","value":65},{"label":"홈페이지","value":95},{"label":"SNS","value":50}]' data-vshape="heatGrid"></div></div>
  </div>

  <div class="note">※ 데이터·수치는 <b>렌더링 데모용 샘플</b>입니다. 실제 콘텐츠엔 검증 가능한 실측치만 사용하며, 의료 성과 표현은 의료법 기준을 따릅니다.</div>
</div>
<script src="../assets/infographics.js?v=1.1.0"></script>
<script>try{VInfo.scan(document);}catch(e){document.body.insertAdjacentHTML('beforeend','<pre>'+e+'</pre>');}</script>
</body>
</html>
