<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>VENOM GrowthOps · 검색 성장 콘솔</title>
<style>
  :root{
    --p:#533afd; --bd:#1c1e54; --ink:#0d253d; --ink2:#273951; --mute:#64748d;
    --soft:#f6f9fc; --border:#e3e8ee; --r12:12px; --r16:16px;
    --ok:#16a34a; --warn:#d97706; --bad:#dc2626;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:var(--ink);background:var(--soft)}
  header{background:var(--bd);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px}
  header h1{font-size:1.05rem;margin:0;font-weight:700;letter-spacing:.2px}
  header .tag{font-size:.72rem;background:rgba(255,255,255,.15);padding:3px 8px;border-radius:999px}
  .wrap{max-width:1080px;margin:0 auto;padding:24px}
  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .tab{padding:9px 16px;border:1px solid var(--border);background:#fff;border-radius:999px;cursor:pointer;font-weight:600;color:var(--ink2)}
  .tab.on{background:var(--p);color:#fff;border-color:var(--p)}
  .card{background:#fff;border:1px solid var(--border);border-radius:var(--r16);padding:20px;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .stat{background:var(--soft);border:1px solid var(--border);border-radius:var(--r12);padding:14px}
  .stat .n{font-size:1.6rem;font-weight:800;color:var(--p)}
  .stat .l{font-size:.78rem;color:var(--mute);margin-top:2px}
  h2{font-size:1.05rem;margin:0 0 14px}
  h3{font-size:.9rem;color:var(--ink2);margin:18px 0 8px}
  table{width:100%;border-collapse:collapse;font-size:.86rem}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)}
  th{color:var(--mute);font-weight:600;font-size:.78rem}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:.72rem;font-weight:600}
  .s-lead{background:#eef2ff;color:#4338ca}.s-contacted{background:#fef9c3;color:#854d0e}
  .s-replied{background:#e0f2fe;color:#075985}.s-published{background:#dcfce7;color:#166534}
  .s-maintained{background:#d1fae5;color:#065f46}.s-declined{background:#fee2e2;color:#991b1b}
  .s-archived{background:#f1f5f9;color:#475569}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:10px;font:inherit;background:#fff}
  textarea{min-height:60px;resize:vertical}
  label{display:block;font-size:.78rem;color:var(--mute);margin:0 0 4px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .btn{padding:9px 16px;border:0;border-radius:10px;background:var(--p);color:#fff;font-weight:700;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--p);border:1px solid var(--p)}
  .btn.sm{padding:5px 10px;font-size:.78rem}
  .muted{color:var(--mute);font-size:.82rem}
  .empty{color:var(--mute);text-align:center;padding:28px}
  .secretbar{display:flex;gap:8px;align-items:center;margin-left:auto}
  .secretbar input{width:170px;padding:6px 9px;font-size:.8rem}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.3s;font-size:.85rem;z-index:50}
  .toast.show{opacity:1}
  svg .ax{stroke:var(--border)}
  .hide{display:none}
  .orphan{color:var(--bad);font-weight:600}
</style>
</head>
<body>
<header>
  <h1>VENOM GrowthOps</h1><span class="tag">검색 성장 콘솔</span>
  <div class="secretbar">
    <input id="secret" type="password" placeholder="ADMIN_SECRET" title="쓰기 작업에 필요">
    <button class="btn sm ghost" onclick="saveSecret()">저장</button>
  </div>
</header>

<div class="wrap">
  <div class="tabs">
    <div class="tab on" data-t="monitor" onclick="tab('monitor')">SEO 모니터</div>
    <div class="tab" data-t="outreach" onclick="tab('outreach')">아웃리치 CRM</div>
  </div>

  <!-- ───────── SEO 모니터 ───────── -->
  <section id="t-monitor">
    <div class="card">
      <h2>내부링크 헬스</h2>
      <div class="grid" id="lh-stats"><div class="empty">불러오는 중…</div></div>
    </div>
    <div class="card">
      <h2>고아 글 (인바운드 내부링크 0)</h2>
      <p class="muted">관련 글에서 링크가 들어오지 않는 글입니다. 내부링크를 추가하면 색인·권위 흐름이 좋아집니다.</p>
      <div id="orphans"></div>
    </div>
    <div class="card">
      <h2>일별 추세 <button class="btn sm ghost" onclick="snapshot()">오늘 스냅샷 저장</button></h2>
      <p class="muted">스냅샷(고아 글 수·글당 평균 내부링크)의 시계열입니다.</p>
      <div id="trend"><div class="empty muted">아직 스냅샷이 없습니다. “오늘 스냅샷 저장”을 눌러 시작하세요.</div></div>
    </div>
  </section>

  <!-- ───────── 아웃리치 CRM ───────── -->
  <section id="t-outreach" class="hide">
    <div class="card">
      <h2>파이프라인 요약</h2>
      <div class="grid" id="oc-summary"><div class="empty">불러오는 중…</div></div>
    </div>
    <div class="card">
      <h2 id="form-title">새 연락처 추가</h2>
      <input type="hidden" id="f-id">
      <div class="row">
        <div><label>매체/담당자명 *</label><input id="f-name" placeholder="예: 대구의료신문"></div>
        <div><label>사이트 URL</label><input id="f-site" placeholder="https://"></div>
      </div>
      <div class="row">
        <div><label>유형</label><select id="f-type">
          <option value="guestpost">게스트포스팅</option><option value="pr">디지털 PR</option>
          <option value="partnership">제휴</option><option value="interview">인터뷰</option>
          <option value="resource">리소스 등재</option><option value="directory">디렉터리(정식)</option>
        </select></div>
        <div><label>상태</label><select id="f-status">
          <option value="lead">lead</option><option value="contacted">contacted</option>
          <option value="replied">replied</option><option value="published">published</option>
          <option value="maintained">maintained</option><option value="declined">declined</option>
          <option value="archived">archived</option>
        </select></div>
      </div>
      <div class="row">
        <div><label>담당자</label><input id="f-owner" placeholder="우리측 담당"></div>
        <div><label>다음 액션일 (YYYY-MM-DD)</label><input id="f-next" placeholder="2026-07-10"></div>
      </div>
      <div style="margin-bottom:12px"><label>메모</label><textarea id="f-notes" placeholder="제안 내용, 진행 상황…"></textarea></div>
      <button class="btn" onclick="saveContact()">저장</button>
      <button class="btn ghost" onclick="resetForm()">초기화</button>
    </div>
    <div class="card">
      <h2>오늘 할 일 (리마인더)</h2>
      <div id="reminders"><div class="muted">—</div></div>
    </div>
    <div class="card">
      <h2>연락처</h2>
      <div id="contacts"></div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/growthops';
let SECRET = localStorage.getItem('growthops_secret') || '';
document.getElementById('secret').value = SECRET;
function saveSecret(){ SECRET = document.getElementById('secret').value.trim(); localStorage.setItem('growthops_secret', SECRET); toast('시크릿 저장됨'); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1900); }
function authHeaders(){ return SECRET ? {'Authorization':'Bearer '+SECRET,'Content-Type':'application/json'} : {'Content-Type':'application/json'}; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function tab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.t===name));
  document.getElementById('t-monitor').classList.toggle('hide', name!=='monitor');
  document.getElementById('t-outreach').classList.toggle('hide', name!=='outreach');
  if(name==='monitor') loadMonitor(); else loadOutreach();
}

// ── SEO 모니터 ──
async function loadMonitor(){
  try{
    const r = await fetch(API+'?module=linkhealth').then(r=>r.json());
    document.getElementById('lh-stats').innerHTML = [
      ['발행 글', r.posts],
      ['글당 평균 내부링크', r.avgLinksPerPost],
      ['고아 글', r.orphanCount],
      ['고아 비율', (r.orphanRate*100).toFixed(1)+'%'],
    ].map(([l,n])=>`<div class="stat"><div class="n">${esc(n)}</div><div class="l">${l}</div></div>`).join('');
    const orph = (r.orphans||[]);
    document.getElementById('orphans').innerHTML = orph.length ? (
      '<table><tr><th>제목</th><th>카테고리</th><th>ID</th></tr>'+
      orph.map(o=>`<tr><td class="orphan">${esc(o.title)}</td><td>${esc(o.cat||'-')}</td><td class="muted">${esc(o.id)}</td></tr>`).join('')+
      '</table>'
    ) : '<div class="empty" style="color:var(--ok)">고아 글이 없습니다 👍</div>';
  }catch(e){ toast('모니터 로드 실패'); }
  loadTrend();
}
async function loadTrend(){
  try{
    const j = await fetch('/content/seo-snapshots.json?_='+Date.now()).then(r=>r.ok?r.json():{snapshots:[]});
    const snaps = (j.snapshots||[]).slice().reverse(); // 오래된→최신
    if(!snaps.length) return;
    document.getElementById('trend').innerHTML = lineChart(snaps);
  }catch(e){}
}
function lineChart(snaps){
  const W=640,H=180,P=30; const xs=snaps.map((s,i)=>i);
  const series=[{k:'orphanCount',c:'#dc2626',label:'고아 글'},{k:'avgLinksPerPost',c:'#533afd',label:'평균 링크'}];
  const maxY=Math.max(1,...snaps.flatMap(s=>series.map(se=>+s[se.k]||0)));
  const x=i=>P+(W-2*P)*(snaps.length<2?0.5:i/(snaps.length-1));
  const y=v=>H-P-(H-2*P)*(v/maxY);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%"><line class="ax" x1="${P}" y1="${H-P}" x2="${W-P}" y2="${H-P}"/><line class="ax" x1="${P}" y1="${P}" x2="${P}" y2="${H-P}"/>`;
  for(const se of series){
    const pts=snaps.map((s,i)=>`${x(i)},${y(+s[se.k]||0)}`).join(' ');
    svg+=`<polyline fill="none" stroke="${se.c}" stroke-width="2" points="${pts}"/>`;
  }
  svg+='</svg>';
  const legend=series.map(se=>`<span style="color:${se.c};font-weight:600;margin-right:14px">● ${se.label}</span>`).join('');
  const range=`${snaps[0].date} ~ ${snaps[snaps.length-1].date}`;
  return svg+`<div class="muted" style="margin-top:6px">${legend} · ${range}</div>`;
}
async function snapshot(){
  try{
    const r = await fetch(API+'?module=snapshot',{method:'POST',headers:authHeaders()}).then(r=>r.json());
    if(!r.ok){ toast(r.error||'실패'); return; }
    toast('스냅샷 저장됨 ('+r.snapshot.date+')'); loadTrend();
  }catch(e){ toast('스냅샷 실패'); }
}

// ── 아웃리치 CRM ──
async function loadOutreach(){
  try{
    const r = await fetch(API+'?module=outreach&action=list').then(r=>r.json());
    const s=r.summary||{byStatus:{},byType:{}};
    document.getElementById('oc-summary').innerHTML=[
      ['전체',s.total||0],['활성',s.active||0],['게재 확보',s.acquired||0],
      ['lead',s.byStatus.lead||0],['contacted',s.byStatus.contacted||0],['published',s.byStatus.published||0],
    ].map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
    renderContacts(r.contacts||[]);
  }catch(e){ toast('아웃리치 로드 실패'); }
  loadReminders();
}
function renderContacts(list){
  const el=document.getElementById('contacts');
  if(!list.length){ el.innerHTML='<div class="empty">아직 연락처가 없습니다. 위에서 추가하세요.</div>'; return; }
  el.innerHTML='<table><tr><th>매체/담당자</th><th>유형</th><th>상태</th><th>다음액션</th><th></th></tr>'+
    list.map(c=>`<tr>
      <td><b>${esc(c.name)}</b>${c.site?`<br><a class="muted" href="${esc(c.site)}" target="_blank" rel="noopener">${esc(c.site)}</a>`:''}</td>
      <td>${esc(c.type)}</td>
      <td><span class="pill s-${esc(c.status)}">${esc(c.status)}</span></td>
      <td>${esc(c.nextAt||'-')}</td>
      <td style="white-space:nowrap">
        <button class="btn sm ghost" onclick='editContact(${JSON.stringify(c).replace(/'/g,"&#39;")})'>수정</button>
        <button class="btn sm" style="background:var(--bad)" onclick="delContact('${esc(c.id)}')">삭제</button>
      </td></tr>`).join('')+'</table>';
}
async function loadReminders(){
  try{
    const r=await fetch(API+'?module=outreach&action=remind').then(r=>r.json());
    const due=r.due||[];
    document.getElementById('reminders').innerHTML= due.length ?
      ('<table><tr><th>매체</th><th>상태</th><th>예정일</th></tr>'+due.map(c=>
        `<tr><td>${esc(c.name)}</td><td><span class="pill s-${esc(c.status)}">${esc(c.status)}</span></td><td>${esc(c.nextAt)}</td></tr>`).join('')+'</table>')
      : '<div class="muted">오늘 처리할 항목이 없습니다.</div>';
  }catch(e){}
}
function editContact(c){
  document.getElementById('form-title').textContent='연락처 수정';
  for(const [k,id] of [['id','f-id'],['name','f-name'],['site','f-site'],['type','f-type'],['status','f-status'],['owner','f-owner'],['nextAt','f-next'],['notes','f-notes']])
    document.getElementById(id).value=c[k]||'';
  window.scrollTo({top:0,behavior:'smooth'});
}
function resetForm(){
  document.getElementById('form-title').textContent='새 연락처 추가';
  ['f-id','f-name','f-site','f-owner','f-next','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-type').value='guestpost'; document.getElementById('f-status').value='lead';
}
async function saveContact(){
  if(!SECRET){ toast('ADMIN_SECRET을 먼저 저장하세요'); return; }
  const contact={
    id:document.getElementById('f-id').value||undefined,
    name:document.getElementById('f-name').value.trim(),
    site:document.getElementById('f-site').value.trim(),
    type:document.getElementById('f-type').value,
    status:document.getElementById('f-status').value,
    owner:document.getElementById('f-owner').value.trim(),
    nextAt:document.getElementById('f-next').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
  };
  if(!contact.name){ toast('매체/담당자명은 필수'); return; }
  try{
    const r=await fetch(API+'?module=outreach&action=upsert',{method:'POST',headers:authHeaders(),body:JSON.stringify({contact})}).then(r=>r.json());
    if(!r.ok){ toast((r.errors&&r.errors.join(', '))||r.error||'실패'); return; }
    toast('저장됨'); resetForm(); loadOutreach();
  }catch(e){ toast('저장 실패'); }
}
async function delContact(id){
  if(!SECRET){ toast('ADMIN_SECRET 필요'); return; }
  if(!confirm('삭제하시겠어요?')) return;
  try{
    const r=await fetch(API+'?module=outreach&action=delete',{method:'POST',headers:authHeaders(),body:JSON.stringify({id})}).then(r=>r.json());
    if(!r.ok){ toast(r.error||'실패'); return; }
    toast('삭제됨'); loadOutreach();
  }catch(e){ toast('삭제 실패'); }
}

loadMonitor();
</script>
</body>
</html>
