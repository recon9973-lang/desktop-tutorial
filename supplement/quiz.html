<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>건강 진단 — 당신의 영양제</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:#0075de; --primary-active:#005bab; --secondary:#213183;
      --on-primary:#fff; --canvas:#fff; --canvas-soft:#f6f5f4; --surface:#fff;
      --ink:#000; --ink-secondary:#31302e; --ink-muted:#615d59; --ink-faint:#a39e98;
      --hairline:#e6e6e6;
      --accent-sky:#62aef0; --accent-purple:#d6b6f6; --accent-pink:#ff64c8;
      --accent-orange:#dd5b00; --accent-teal:#2a9d99; --accent-green:#1aae39;
      --r-xs:4px; --r-sm:5px; --r-md:8px; --r-lg:12px; --r-xl:16px; --r-full:9999px;
      --shadow-soft:0 0.175px 1.041px rgba(0,0,0,.01),0 0.8px 2.925px rgba(0,0,0,.02),0 2.025px 7.847px rgba(0,0,0,.027),0 4px 18px rgba(0,0,0,.04);
      --shadow-elevated:0 0.175px 1.041px rgba(0,0,0,.01),0 0.8px 2.925px rgba(0,0,0,.02),0 2.025px 7.847px rgba(0,0,0,.027),0 4px 18px rgba(0,0,0,.04),0 23px 52px rgba(0,0,0,.05);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Inter',-apple-system,system-ui,'Segoe UI',Helvetica,Arial,sans-serif;
      background:var(--canvas-soft); color:var(--ink); -webkit-font-smoothing:antialiased;
      min-height:100vh; display:flex; flex-direction:column;
    }
    a{text-decoration:none;color:inherit;}

    /* Nav */
    .nav{background:var(--surface);border-bottom:1px solid var(--hairline);}
    .nav-inner{
      display:flex;align-items:center;justify-content:space-between;
      height:56px;max-width:680px;margin:0 auto;padding:0 24px;
    }
    .nav-logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;letter-spacing:-.3px;}
    .nav-logo .logo-sticker{
      width:28px;height:28px;border-radius:var(--r-md);
      background:linear-gradient(135deg,var(--accent-teal),var(--accent-sky));
      display:flex;align-items:center;justify-content:center;font-size:14px;
    }
    .nav-exit{font-size:13px;color:var(--ink-faint);}
    .nav-exit:hover{color:var(--ink-muted);}

    /* Progress bar */
    .progress-track{height:4px;background:var(--hairline);}
    .progress-fill{height:100%;background:var(--primary);width:0;transition:width .4s cubic-bezier(.4,0,.2,1);}

    /* Stage */
    .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
    .card{
      width:100%;max-width:560px;background:var(--surface);
      border:1px solid var(--hairline);border-radius:var(--r-xl);
      box-shadow:var(--shadow-soft);overflow:hidden;
    }
    .card-body{padding:40px 36px;}
    .step-counter{
      font-size:11px;font-weight:600;letter-spacing:.125px;text-transform:uppercase;
      color:var(--primary);background:rgba(0,117,222,.08);
      border-radius:var(--r-full);padding:4px 10px;display:inline-block;margin-bottom:18px;
    }
    .question{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1.3;margin-bottom:8px;}
    .question-hint{font-size:14px;color:var(--ink-muted);margin-bottom:28px;line-height:1.5;}
    .options{display:flex;flex-direction:column;gap:10px;}
    .option{
      display:flex;align-items:center;gap:14px;padding:16px 18px;
      border:1.5px solid var(--hairline);border-radius:var(--r-md);
      cursor:pointer;font-size:15px;color:var(--ink);background:var(--surface);
      transition:border-color .15s,background .15s,transform .1s;
    }
    .option:hover{border-color:var(--primary);background:rgba(0,117,222,.04);}
    .option:active{transform:scale(.99);}
    .option.selected{border-color:var(--primary);background:rgba(0,117,222,.06);font-weight:500;}
    .option-check{
      width:22px;height:22px;border-radius:50%;border:2px solid var(--hairline);
      flex-shrink:0;display:flex;align-items:center;justify-content:center;
      transition:border-color .15s,background .15s;
    }
    .option.selected .option-check{border-color:var(--primary);background:var(--primary);}
    .option.selected .option-check::after{content:'✓';color:#fff;font-size:12px;font-weight:700;}
    .option-icon{font-size:22px;}
    .option-text{flex:1;}
    .option-multi-hint{font-size:12px;color:var(--ink-faint);margin-top:14px;}

    /* Footer nav */
    .card-footer{
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 36px;border-top:1px solid var(--hairline);background:var(--canvas-soft);
    }
    .btn-back{
      font-size:14px;font-weight:500;color:var(--ink-muted);background:transparent;
      border:none;cursor:pointer;padding:8px 4px;
    }
    .btn-back:hover{color:var(--ink);}
    .btn-back:disabled{opacity:0;cursor:default;}
    .btn-next{
      font-size:15px;font-weight:500;color:var(--on-primary);background:var(--primary);
      border:none;border-radius:var(--r-full);padding:11px 26px;cursor:pointer;
      transition:background .15s,transform .1s,opacity .15s;
    }
    .btn-next:hover{background:var(--primary-active);}
    .btn-next:active{transform:scale(.97);}
    .btn-next:disabled{opacity:.4;cursor:not-allowed;background:var(--primary);}

    /* Loading / analyzing screen */
    .analyzing{text-align:center;max-width:420px;}
    .analyzing .spinner{
      width:64px;height:64px;margin:0 auto 28px;border-radius:50%;
      border:4px solid var(--hairline);border-top-color:var(--primary);
      animation:spin 0.9s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .analyzing h2{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:10px;}
    .analyzing p{font-size:15px;color:var(--ink-muted);line-height:1.6;}
    .analyzing-steps{margin-top:28px;text-align:left;display:flex;flex-direction:column;gap:10px;}
    .a-step{
      display:flex;align-items:center;gap:12px;font-size:14px;color:var(--ink-faint);
      opacity:.4;transition:opacity .3s,color .3s;
    }
    .a-step.active{opacity:1;color:var(--ink-secondary);}
    .a-step.done{opacity:1;color:var(--ink-secondary);}
    .a-step .tick{
      width:22px;height:22px;border-radius:50%;background:var(--hairline);flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:12px;
      transition:background .3s;
    }
    .a-step.done .tick{background:var(--accent-green);color:#fff;}
    .a-step.active .tick{background:var(--primary);color:#fff;}

    /* Intro screen */
    .intro{text-align:center;max-width:480px;}
    .intro .intro-emoji{font-size:52px;margin-bottom:20px;}
    .intro h1{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1.2;margin-bottom:14px;}
    .intro p{font-size:15px;color:var(--ink-muted);line-height:1.6;margin-bottom:28px;}
    .intro-meta{display:flex;gap:10px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
    .intro-chip{
      font-size:13px;font-weight:500;color:var(--ink-secondary);
      background:var(--canvas-soft);border-radius:var(--r-full);padding:7px 14px;
    }
    .btn-start{
      font-size:16px;font-weight:500;color:var(--on-primary);background:var(--primary);
      border:none;border-radius:var(--r-full);padding:14px 36px;cursor:pointer;
      box-shadow:var(--shadow-soft);transition:background .15s,transform .1s;
    }
    .btn-start:hover{background:var(--primary-active);}
    .btn-start:active{transform:scale(.97);}

    .hidden{display:none !important;}

    @media (max-width:600px){
      .card-body{padding:32px 22px;}
      .card-footer{padding:16px 22px;}
      .question{font-size:21px;}
      .intro h1{font-size:26px;}
    }
  </style>
</head>
<body>

<!-- Nav -->
<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-sticker">💊</div>
      당신의 영양제
    </a>
    <a href="index.html" class="nav-exit">나가기 ✕</a>
  </div>
</header>

<!-- Progress -->
<div class="progress-track">
  <div class="progress-fill" id="progressFill"></div>
</div>

<!-- Stage -->
<main class="stage" id="stage">
  <!-- Intro -->
  <div class="intro" id="introScreen">
    <div class="intro-emoji">🩺</div>
    <h1>3분 건강 진단으로<br>나만의 영양제 찾기</h1>
    <p>몇 가지 질문에 답하면 AI가 나에게 꼭 맞는<br>영양제 루틴을 추천해 드려요.</p>
    <div class="intro-meta">
      <span class="intro-chip">⏱️ 약 3분 소요</span>
      <span class="intro-chip">🔒 정보 안전 보호</span>
      <span class="intro-chip">💳 가입·결제 불필요</span>
    </div>
    <div><button class="btn-start" onclick="startQuiz()">진단 시작하기 →</button></div>
  </div>

  <!-- Question card (rendered by JS) -->
  <div class="card hidden" id="quizCard">
    <div class="card-body">
      <span class="step-counter" id="stepCounter">질문 1 / 5</span>
      <h2 class="question" id="questionText"></h2>
      <p class="question-hint" id="questionHint"></p>
      <div class="options" id="optionsList"></div>
      <p class="option-multi-hint hidden" id="multiHint">여러 개 선택할 수 있어요</p>
    </div>
    <div class="card-footer">
      <button class="btn-back" id="btnBack" onclick="goBack()">← 이전</button>
      <button class="btn-next" id="btnNext" onclick="goNext()" disabled>다음 →</button>
    </div>
  </div>

  <!-- Analyzing -->
  <div class="analyzing hidden" id="analyzingScreen">
    <div class="spinner"></div>
    <h2>AI가 분석하고 있어요</h2>
    <p>입력하신 정보를 120개 영양소 데이터와 대조하는 중입니다.</p>
    <div class="analyzing-steps">
      <div class="a-step" data-i="0"><span class="tick">1</span> 건강 상태 정리</div>
      <div class="a-step" data-i="1"><span class="tick">2</span> 부족 영양소 탐색</div>
      <div class="a-step" data-i="2"><span class="tick">3</span> 성분 상호작용 검토</div>
      <div class="a-step" data-i="3"><span class="tick">4</span> 맞춤 루틴 생성</div>
    </div>
  </div>
</main>

<script>
  /* ── Quiz data ─────────────────────────────────────────────── */
  const QUESTIONS = [
    {
      q: "기본 정보를 알려주세요",
      hint: "나이대에 따라 필요한 영양소가 달라요.",
      multi: false,
      options: [
        { icon:"🧑", text:"20–30대" },
        { icon:"🧓", text:"40–50대" },
        { icon:"👵", text:"60대 이상" },
      ],
    },
    {
      q: "요즘 가장 신경 쓰이는<br>건강 문제는 무엇인가요?",
      hint: "가장 가까운 것을 골라 주세요.",
      multi: false,
      options: [
        { icon:"😴", text:"항상 피곤하고 에너지가 부족해요" },
        { icon:"🧠", text:"집중력·기억력이 걱정돼요" },
        { icon:"🦴", text:"관절·뼈 건강이 걱정돼요" },
        { icon:"🛡️", text:"면역력을 높이고 싶어요" },
      ],
    },
    {
      q: "평소 생활 패턴은<br>어떤가요?",
      hint: "해당하는 것을 모두 선택하세요.",
      multi: true,
      options: [
        { icon:"💻", text:"실내 근무가 많고 햇빛을 거의 못 봐요" },
        { icon:"🌙", text:"수면이 부족하거나 불규칙해요" },
        { icon:"🍔", text:"외식·배달 위주로 식사해요" },
        { icon:"🏃", text:"규칙적으로 운동해요" },
      ],
    },
    {
      q: "현재 복용 중인 약이나<br>건강 상태가 있나요?",
      hint: "안전한 추천을 위해 꼭 필요해요.",
      multi: false,
      options: [
        { icon:"✅", text:"특별한 약·질환 없어요" },
        { icon:"💊", text:"만성질환 약을 복용 중이에요" },
        { icon:"🤰", text:"임신·수유 중이거나 계획 중이에요" },
      ],
    },
    {
      q: "영양제에 한 달에<br>얼마까지 쓸 수 있나요?",
      hint: "예산에 맞춰 우선순위를 정해 드려요.",
      multi: false,
      options: [
        { icon:"🪙", text:"2만 원 이하 — 꼭 필요한 것만" },
        { icon:"💰", text:"2–5만 원 — 균형 잡힌 루틴" },
        { icon:"💎", text:"5만 원 이상 — 프리미엄 케어" },
      ],
    },
  ];

  let current = 0;
  const answers = {};

  const fill      = document.getElementById('progressFill');
  const introEl   = document.getElementById('introScreen');
  const cardEl    = document.getElementById('quizCard');
  const analyzeEl = document.getElementById('analyzingScreen');

  function startQuiz(){
    introEl.classList.add('hidden');
    cardEl.classList.remove('hidden');
    current = 0;
    render();
  }

  function render(){
    const item = QUESTIONS[current];
    document.getElementById('stepCounter').textContent = `질문 ${current+1} / ${QUESTIONS.length}`;
    document.getElementById('questionText').innerHTML = item.q;
    document.getElementById('questionHint').textContent = item.hint;
    document.getElementById('multiHint').classList.toggle('hidden', !item.multi);

    const list = document.getElementById('optionsList');
    list.innerHTML = '';
    const saved = answers[current] || [];

    item.options.forEach((opt, i) => {
      const el = document.createElement('div');
      el.className = 'option' + (saved.includes(i) ? ' selected' : '');
      el.innerHTML = `
        <span class="option-check"></span>
        <span class="option-icon">${opt.icon}</span>
        <span class="option-text">${opt.text}</span>`;
      el.onclick = () => select(i);
      list.appendChild(el);
    });

    // progress: include intro at 0, completion at 100
    fill.style.width = ((current) / QUESTIONS.length * 100) + '%';
    document.getElementById('btnBack').disabled = current === 0;
    updateNext();
  }

  function select(i){
    const item = QUESTIONS[current];
    let sel = answers[current] || [];
    if(item.multi){
      sel = sel.includes(i) ? sel.filter(x => x !== i) : [...sel, i];
    } else {
      sel = [i];
    }
    answers[current] = sel;
    render();
  }

  function updateNext(){
    const has = (answers[current] || []).length > 0;
    document.getElementById('btnNext').disabled = !has;
    document.getElementById('btnNext').textContent =
      current === QUESTIONS.length - 1 ? '결과 보기 →' : '다음 →';
  }

  function goNext(){
    if((answers[current] || []).length === 0) return;
    if(current < QUESTIONS.length - 1){
      current++;
      render();
    } else {
      finish();
    }
  }

  function goBack(){
    if(current > 0){ current--; render(); }
  }

  function finish(){
    fill.style.width = '100%';
    cardEl.classList.add('hidden');
    analyzeEl.classList.remove('hidden');

    // store answers so result page could read them later
    try { localStorage.setItem('supplementAnswers', JSON.stringify(answers)); } catch(e){}

    const steps = document.querySelectorAll('.a-step');
    let i = 0;
    steps[0].classList.add('active');
    const timer = setInterval(() => {
      steps[i].classList.remove('active');
      steps[i].classList.add('done');
      steps[i].querySelector('.tick').textContent = '✓';
      i++;
      if(i < steps.length){
        steps[i].classList.add('active');
      } else {
        clearInterval(timer);
        setTimeout(() => { window.location.href = 'result.html'; }, 600);
      }
    }, 700);
  }
</script>

</body>
</html>
