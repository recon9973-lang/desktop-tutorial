name: Convert images to WebP

on:
  push:
    branches:
      - main
    paths:
      - 'venom-wordpress/preview/images/**'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Convert images to WebP
        run: node scripts/convert-to-webp.js

      - name: Commit WebP files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add venom-wordpress/preview/images/*.webp 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: auto-convert images to WebP"
          git push origin main
