name: Convert images to WebP

on:
  push:
    branches:
      - main
    paths:
      - 'venom-wordpress/preview/images/**'
      - 'venom-wordpress/preview/content/images/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # sharp는 루트 package.json 의존성이 아니므로 명시 설치 (미설치 시 변환이 조용히 스킵되던 버그 수정)
      - name: Install sharp
        run: npm install sharp --no-save

      - name: Convert images to WebP
        run: node scripts/convert-to-webp.js

      - name: Commit WebP files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'venom-wordpress/preview/images/**/*.webp' 'venom-wordpress/preview/content/images/**/*.webp' 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: auto-convert images to WebP"
          git push origin main
